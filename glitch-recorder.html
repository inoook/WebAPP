<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>グリッチ録画（ストリート）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rock+Salt&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#07080a; --fg:#f4f5f7; --muted:#8b929c; --rec:#ff3b30; --ok:#34c759; --line:#2a2e35; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--fg);
    font-family:-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;overscroll-behavior:none}
  #stage{position:fixed;inset:0;display:flex;flex-direction:column}
  .view{position:relative;flex:1;background:#000;overflow:hidden}
  #cam{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;opacity:0}
  #preview{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2;background:#000}
  .track{position:absolute;top:max(14px,env(safe-area-inset-top));left:12px;right:12px;
    height:4px;border-radius:99px;background:rgba(255,255,255,.25);overflow:hidden;z-index:3}
  .track>i{display:block;height:100%;width:0;background:var(--fg)}
  .recording .track>i{background:var(--rec)}
  .clock{position:absolute;left:0;right:0;bottom:40px;text-align:center;font-variant-numeric:tabular-nums;
    font-size:13px;letter-spacing:.04em;color:var(--muted);z-index:3;pointer-events:none}
  .hint{position:absolute;left:0;right:0;bottom:14px;text-align:center;font-size:12px;
    color:var(--muted);z-index:3;pointer-events:none}
  .bar{display:flex;align-items:center;justify-content:space-between;
    padding:18px 26px calc(20px + env(safe-area-inset-bottom));gap:16px;background:var(--bg)}
  .slot{width:64px;display:flex;justify-content:center}
  .txt{background:none;border:0;color:var(--fg);font-size:15px;padding:10px;cursor:pointer}
  .txt:disabled{color:var(--line)}
  #shutter{width:74px;height:74px;border-radius:50%;border:4px solid var(--fg);background:transparent;
    padding:5px;display:grid;place-items:center;cursor:pointer;touch-action:none;
    -webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
  #shutter>span{width:100%;height:100%;border-radius:50%;background:var(--rec);transition:border-radius .15s,transform .15s}
  #shutter:disabled{opacity:.35}
  #shutter.holding>span{border-radius:30%;transform:scale(.7)}
  #result{position:fixed;inset:0;background:var(--bg);z-index:9;display:none;flex-direction:column;
    padding:max(16px,env(safe-area-inset-top)) 16px calc(16px + env(safe-area-inset-bottom))}
  #result.show{display:flex}
  #result video{position:static;flex:1;border-radius:14px;object-fit:contain;background:#000}
  .rbar{display:flex;gap:12px;padding-top:14px}
  .btn{flex:1;text-align:center;text-decoration:none;padding:15px;border-radius:12px;font-size:16px;font-weight:600;border:0;cursor:pointer}
  .btn.dl{background:var(--ok);color:#04270f}
  .btn.again{background:var(--line);color:var(--fg)}
  .note{padding-top:10px;font-size:12px;color:var(--muted);text-align:center;line-height:1.6}
  #msg{position:fixed;inset:0;display:none;place-items:center;padding:32px;text-align:center;
    color:var(--muted);font-size:15px;line-height:1.7;z-index:20;white-space:pre-line}
</style>
</head>
<body>
<div id="stage">
  <div class="view" id="view">
    <video id="cam" autoplay muted playsinline></video>
    <canvas id="preview"></canvas>
    <div class="track"><i id="bar"></i></div>
    <div class="clock"><span id="time">0.0 / 15.0s</span></div>
    <div class="hint">押している間だけ録画／押すたびにトランジション＋日付タグ</div>
  </div>
  <div class="bar">
    <div class="slot"></div>
    <button id="shutter" aria-label="押している間だけ録画"><span></span></button>
    <div class="slot"><button id="finish" class="txt" disabled>完了</button></div>
  </div>
</div>

<div id="result">
  <video id="out" controls playsinline></video>
  <div class="rbar">
    <button id="retake" class="btn again">撮り直す</button>
    <button id="save" class="btn dl">保存</button>
  </div>
  <div class="note" id="savehint"></div>
</div>

<div id="msg"></div>

<script>
const MAX_MS = 15000;
const $ = s => document.querySelector(s);
const cam=$('#cam'), canvas=$('#preview'), shutter=$('#shutter'), finishBtn=$('#finish'),
      bar=$('#bar'), timeEl=$('#time'), view=$('#view'),
      resultEl=$('#result'), out=$('#out'), saveBtn=$('#save'),
      retake=$('#retake'), saveHint=$('#savehint'), msg=$('#msg');
const ctx=canvas.getContext('2d');

let stream, recordStream, recorder, chunks=[], mime='', lastBlob=null;
let accMs=0, holding=false, started=false, holdStart=0, rafMeter=0;
let fx=null, tag=null, tagUntil=0, sessionStart=Date.now();
let sCv, sCtx, tCv, tCtx, scanPat;          // s=スナップショット, t=チャンネル合成用テンポラリ

const r255=()=>Math.floor(Math.random()*256);
const rnd=(a,b)=>a+Math.random()*(b-a);
const STREET=['#ff2e63','#08f7fe','#f5d300','#39ff14','#ff6f00','#ff124f'];
function fail(t){msg.textContent=t;msg.style.display='grid';}

function pickMime(){
  const c=['video/mp4','video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm'];
  return c.find(m=>window.MediaRecorder&&MediaRecorder.isTypeSupported(m))||'';
}
function makeRecorder(){
  recorder=new MediaRecorder(recordStream, mime?{mimeType:mime}:undefined);
  recorder.ondataavailable=e=>{ if(e.data&&e.data.size) chunks.push(e.data); };
  recorder.onstop=finalize;
}

async function init(){
  if(!navigator.mediaDevices?.getUserMedia) return fail('このブラウザはカメラ取得に対応していません。');
  if(!window.MediaRecorder) return fail('このブラウザはMediaRecorderに非対応です。');
  if(document.fonts&&document.fonts.load){ document.fonts.load("32px 'Rock Salt'").catch(()=>{}); } // 手書きフォント先読み
  try{
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}, audio:true });
  }catch(e){return fail('カメラを開始できませんでした（権限とHTTPS接続を確認してください）。\n'+e.message);}
  cam.srcObject=stream;
  cam.onloadedmetadata=()=>{
    cam.play().catch(()=>{});
    let vw=cam.videoWidth||1280, vh=cam.videoHeight||720;
    const cap=1280, s=Math.min(1, cap/Math.max(vw,vh));
    canvas.width=Math.round(vw*s); canvas.height=Math.round(vh*s);
    initBuffers();
    requestAnimationFrame(draw);
    recordStream=canvas.captureStream(30);
    stream.getAudioTracks().forEach(t=>recordStream.addTrack(t));
    mime=pickMime();
    makeRecorder();
  };
}
function initBuffers(){
  sCv=document.createElement('canvas'); sCv.width=canvas.width; sCv.height=canvas.height; sCtx=sCv.getContext('2d');
  tCv=document.createElement('canvas'); tCv.width=canvas.width; tCv.height=canvas.height; tCtx=tCv.getContext('2d');
  const sc=document.createElement('canvas'); sc.width=1; sc.height=3;
  const sx=sc.getContext('2d'); sx.fillStyle='rgba(0,0,0,1)'; sx.fillRect(0,2,1,1);
  scanPat=ctx.createPattern(sc,'repeat');
}

/* ===== 描画ループ ===== */
function draw(){
  const w=canvas.width,h=canvas.height;
  ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
  ctx.drawImage(cam,0,0,w,h);
  if(fx){ const p=(performance.now()-fx.start)/fx.dur; if(p>=1){ fx=null; } else applyFx(fx,p,w,h); }
  ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
  drawHUD(w,h);
  drawTag(w,h);
  requestAnimationFrame(draw);
}

/* ===== トランジション（色収差・ブロックシャッフル・VHS・ストロボ） ===== */
const FX=['chroma','shuffle','vhs','strobe'];
function fireTransition(){
  const kind=FX[Math.floor(Math.random()*FX.length)];
  const base={chroma:340,shuffle:360,vhs:380,strobe:340}[kind];
  fx={kind, start:performance.now(), dur:base*rnd(0.8,1.3)};
  if(kind==='chroma') fx.angle=Math.random()<0.7 ? rnd(-0.25,0.25) : rnd(0,6.283);
  if(kind==='shuffle'){ fx.cols=6+Math.floor(Math.random()*7); fx.rows=4+Math.floor(Math.random()*5); }
  if(kind==='strobe'){ fx.flashes=4+Math.floor(Math.random()*5); fx.seed=Math.floor(Math.random()*9); }
}
function applyFx(fx,p,w,h){
  if(fx.kind==='chroma') fxChroma(fx,p,w,h);
  else if(fx.kind==='shuffle') fxShuffle(fx,p,w,h);
  else if(fx.kind==='vhs') fxVHS(fx,p,w,h);
  else fxStrobe(fx,p,w,h);
}

/* 色収差：RGBチャンネルを分離してずらす（収束して元に戻る） */
function channel(src,color,dx,dy){
  const w=canvas.width,h=canvas.height;
  tCtx.globalCompositeOperation='source-over'; tCtx.clearRect(0,0,w,h); tCtx.drawImage(src,0,0);
  tCtx.globalCompositeOperation='multiply'; tCtx.fillStyle=color; tCtx.fillRect(0,0,w,h);
  ctx.globalCompositeOperation='lighter'; ctx.drawImage(tCv,dx,dy);
}
function fxChroma(fx,p,w,h){
  const k=1-p, amt=w*0.02*(0.3+k);
  sCtx.clearRect(0,0,w,h); sCtx.drawImage(canvas,0,0);          // 元フレームを退避
  ctx.globalCompositeOperation='source-over'; ctx.fillStyle='#000'; ctx.fillRect(0,0,w,h);
  const dx=Math.cos(fx.angle)*amt, dy=Math.sin(fx.angle)*amt;
  channel(sCv,'#ff0000', dx, dy);
  channel(sCv,'#00ff00', 0, 0);
  channel(sCv,'#0000ff', -dx, -dy);
  ctx.globalCompositeOperation='source-over';
  if(Math.random()<0.4){ const sy=Math.random()*h, sh=h*0.02;
    ctx.drawImage(canvas,0,sy,w,sh,(Math.random()*2-1)*w*0.04*k,sy,w,sh); }
}

/* ブロックシャッフル：グリッドの一部を入れ替える（時間経過で元に戻る） */
function fxShuffle(fx,p,w,h){
  const k=1-p, cols=fx.cols, rows=fx.rows, cw=w/cols, ch=h/rows;
  sCtx.clearRect(0,0,w,h); sCtx.drawImage(canvas,0,0);          // ソース
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    if(Math.random() < k*0.85){
      const sc=Math.floor(Math.random()*cols), sr=Math.floor(Math.random()*rows);
      ctx.drawImage(sCv, sc*cw, sr*ch, cw, ch, c*cw, r*ch, cw, ch);  // 別ブロックを持ってくる
      if(Math.random()<0.2){ ctx.save(); ctx.globalCompositeOperation='difference';
        ctx.fillStyle='rgb('+r255()+','+r255()+','+r255()+')'; ctx.fillRect(c*cw,r*ch,cw,ch); ctx.restore(); }
    }
  }
}

function fxVHS(fx,p,w,h){
  const k=1-p;
  ctx.save(); ctx.globalCompositeOperation='screen'; ctx.globalAlpha=0.4;
  const gx=w*0.012*(0.6+k); ctx.drawImage(canvas,gx,0); ctx.drawImage(canvas,-gx,0); ctx.restore();
  const rows=4+Math.floor(Math.random()*4);
  for(let i=0;i<rows;i++){ const sy=Math.random()*h, sh=h*(0.01+Math.random()*0.03);
    ctx.drawImage(canvas,0,sy,w,sh,(Math.random()*2-1)*w*0.06*k,sy,w,sh); }
  ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=0.5*k; ctx.fillStyle='#fff';
  for(let i=0;i<2;i++) ctx.fillRect(0,Math.random()*h,w,1+Math.random()*2); ctx.restore();
}

function fxStrobe(fx,p,w,h){
  const phase=Math.floor(p*fx.flashes);
  if(phase%2===1){ const r=(phase*7+fx.seed)%3;
    if(r===0){ ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h); }
    else if(r===1){ ctx.fillStyle='#000'; ctx.fillRect(0,0,w,h); }
    else { ctx.save(); ctx.globalCompositeOperation='difference'; ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h); ctx.restore(); }
  } else if(Math.random()<0.5){
    ctx.save(); ctx.globalCompositeOperation='overlay'; ctx.globalAlpha=0.55; ctx.fillStyle='#808080'; ctx.fillRect(0,0,w,h); ctx.restore();
  }
}

/* ===== 手書き日付タグ（Rock Salt） ===== */
function dateStr(d){ return d.getFullYear()+'.'+(d.getMonth()+1)+'.'+d.getDate(); }
function fireTag(){
  tagUntil=performance.now()+1900;
  tag={ x:rnd(0.10,0.26), y:rnd(0.50,0.68), rot:rnd(-0.42,-0.28),
        size:rnd(0.085,0.11), text:dateStr(new Date()) };
}
function drawTag(w,h){
  if(!tag || performance.now()>=tagUntil) return;
  const life=1-(tagUntil-performance.now())/1900;     // 0→1
  const fade = life<0.85 ? 1 : 1-(life-0.85)/0.15;    // 終盤フェード
  const reveal = Math.min(1, life/0.4);               // 前半で書き出す
  const fs=Math.round(h*tag.size), txt=tag.text;
  ctx.save();
  ctx.translate(tag.x*w, tag.y*h); ctx.rotate(tag.rot);
  ctx.font=fs+"px 'Rock Salt', cursive"; ctx.textBaseline='alphabetic';
  const tw=ctx.measureText(txt).width;
  ctx.beginPath(); ctx.rect(-fs*0.4, -fs*1.6, tw*reveal+fs*0.4, fs*2.2); ctx.clip();  // 左から出現
  ctx.globalAlpha=fade;
  ctx.fillStyle='#000'; ctx.fillText(txt,0,0);        // 黒・袋文字なし・下線なし
  ctx.restore();
}

/* ===== HUD（タイムコード等・薄く常駐） ===== */
function pad2(n){ return String(n).padStart(2,'0'); }
function timecode(){
  let ms=Date.now()-sessionStart; const f=Math.floor((ms%1000)/(1000/30)); ms=Math.floor(ms/1000);
  return pad2(Math.floor(ms/3600))+':'+pad2(Math.floor(ms/60)%60)+':'+pad2(ms%60)+':'+pad2(f);
}
function bracket(x,y,sx,sy,L){ ctx.beginPath(); ctx.moveTo(x+sx*L,y); ctx.lineTo(x,y); ctx.lineTo(x,y+sy*L); ctx.stroke(); }
function drawHUD(w,h){
  ctx.save();
  ctx.globalAlpha=0.08; ctx.fillStyle=scanPat; ctx.fillRect(0,0,w,h); ctx.globalAlpha=1;
  const fs=Math.max(12,Math.round(h*0.030)), pad=Math.round(h*0.035);
  ctx.font=fs+'px ui-monospace, Menlo, monospace'; ctx.textBaseline='top';
  if(Math.floor(Date.now()/500)%2===0){ ctx.fillStyle='rgba(255,59,48,0.95)';
    ctx.beginPath(); ctx.arc(pad+fs*0.35, pad+fs*0.55, fs*0.32, 0, 6.283); ctx.fill(); }
  ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.fillText('REC', pad+fs*0.9, pad);
  const tc=timecode(), tw=ctx.measureText(tc).width; ctx.fillText(tc, w-pad-tw, pad);
  ctx.strokeStyle='rgba(255,255,255,0.45)'; ctx.lineWidth=Math.max(1.5,h*0.004);
  const L=Math.round(w*0.045), m=pad;
  bracket(m,m,1,1,L); bracket(w-m,m,-1,1,L); bracket(m,h-m,1,-1,L); bracket(w-m,h-m,-1,-1,L);
  ctx.restore();
}

/* ===== 録画（押している間だけ） ===== */
function render(cur){ bar.style.width=Math.min(cur/MAX_MS*100,100)+'%';
  timeEl.textContent=(Math.min(cur,MAX_MS)/1000).toFixed(1)+' / 15.0s'; }
function meter(){
  if(!holding) return;
  const cur=accMs+(performance.now()-holdStart); render(cur);
  if(cur>=MAX_MS){ accMs=MAX_MS; endHold(true); finishRecording(); return; }
  rafMeter=requestAnimationFrame(meter);
}
function startHold(){
  if(!recorder || holding || accMs>=MAX_MS || resultEl.classList.contains('show')) return;
  holding=true; shutter.classList.add('holding'); view.classList.add('recording'); finishBtn.disabled=true;
  if(!started){ recorder.start(); started=true; fireTag(); } else { recorder.resume(); } // タグは最初だけ
  fireTransition();                          // 押した瞬間にトランジション
  holdStart=performance.now(); rafMeter=requestAnimationFrame(meter);
}
function endHold(reachedMax){
  if(!holding) return;
  holding=false; cancelAnimationFrame(rafMeter);
  accMs += performance.now()-holdStart; if(reachedMax) accMs=MAX_MS;
  if(recorder.state==='recording') recorder.pause();
  shutter.classList.remove('holding'); view.classList.remove('recording'); render(accMs);
  if(accMs<MAX_MS) finishBtn.disabled=false;
}
function finishRecording(){ finishBtn.disabled=true; shutter.disabled=true;
  if(recorder && recorder.state!=='inactive') recorder.stop(); }

/* ===== 結果・保存 ===== */
function ext(){ return (lastBlob&&lastBlob.type.includes('mp4'))?'mp4':'webm'; }
function finalize(){
  if(!chunks.length) return;
  const type=chunks[0].type||mime||'video/webm';
  lastBlob=new Blob(chunks,{type}); out.src=URL.createObjectURL(lastBlob);
  const ok = navigator.canShare && navigator.canShare({files:[new File([lastBlob],'v.'+ext(),{type})]});
  saveHint.textContent = ok
    ? '「保存」→ 共有シートの「ビデオを保存」でカメラロールに入ります。'
    : 'この端末では共有保存が使えないため、保存するとファイルとしてダウンロードされます。';
  resultEl.classList.add('show');
}
async function save(){
  if(!lastBlob) return;
  const file=new File([lastBlob], 'glitch-'+Date.now()+'.'+ext(), {type:lastBlob.type});
  if(navigator.canShare && navigator.canShare({files:[file]})){
    try{ await navigator.share({files:[file], title:'グリッチ録画'}); return; }
    catch(e){ if(e.name==='AbortError') return; }
  }
  const a=document.createElement('a'); a.href=URL.createObjectURL(lastBlob); a.download=file.name;
  document.body.appendChild(a); a.click(); a.remove();
}
function reset(){
  resultEl.classList.remove('show');
  chunks=[]; lastBlob=null; accMs=0; holding=false; started=false; fx=null; tag=null;
  shutter.disabled=false; finishBtn.disabled=true; render(0); makeRecorder();
}

shutter.addEventListener('pointerdown',e=>{ e.preventDefault(); startHold(); });
window.addEventListener('pointerup',()=>{ if(holding) endHold(false); });
window.addEventListener('pointercancel',()=>{ if(holding) endHold(false); });
shutter.addEventListener('contextmenu',e=>e.preventDefault());
finishBtn.addEventListener('click',finishRecording);
saveBtn.addEventListener('click',save);
retake.addEventListener('click',reset);
init();
</script>
</body>
</html>
