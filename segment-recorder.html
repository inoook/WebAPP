<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>押している間だけ録画</title>
<style>
  :root{ --bg:#0b0d10; --fg:#f4f5f7; --muted:#8b929c; --rec:#ff3b30; --ok:#34c759; --line:#2a2e35; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--fg);
    font-family:-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;overscroll-behavior:none}
  #stage{position:fixed;inset:0;display:flex;flex-direction:column}
  .view{position:relative;flex:1;background:#000;overflow:hidden}
  video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000}
  .track{position:absolute;top:max(10px,env(safe-area-inset-top));left:12px;right:12px;
    height:4px;border-radius:99px;background:rgba(255,255,255,.25);overflow:hidden;z-index:3}
  .track>i{display:block;height:100%;width:0;background:var(--fg)}
  .recording .track>i{background:var(--rec)}
  /* カメラ／解像度セレクタ */
  .controls{position:absolute;top:max(26px,calc(env(safe-area-inset-top) + 14px));left:0;right:0;
    display:flex;justify-content:center;flex-wrap:wrap;gap:8px;z-index:4;padding:0 12px}
  .controls select{appearance:none;-webkit-appearance:none;background:rgba(0,0,0,.45);color:#fff;
    border:1px solid rgba(255,255,255,.28);border-radius:99px;padding:8px 30px 8px 14px;font-size:13px;
    backdrop-filter:blur(6px);max-width:52vw;text-overflow:ellipsis;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%23fff'/></svg>");
    background-repeat:no-repeat;background-position:right 12px center}
  .controls select:disabled{opacity:.4}
  .actual{position:absolute;top:max(66px,calc(env(safe-area-inset-top) + 54px));left:0;right:0;
    text-align:center;font-size:11px;color:var(--muted);z-index:4;pointer-events:none;
    font-variant-numeric:tabular-nums}
  .clock{position:absolute;left:0;right:0;bottom:42px;text-align:center;
    font-variant-numeric:tabular-nums;font-size:13px;letter-spacing:.04em;color:var(--muted);
    z-index:3;pointer-events:none}
  .recdot{display:none;width:8px;height:8px;border-radius:50%;background:var(--rec);
    vertical-align:middle;margin-right:6px;animation:blink 1s steps(2,end) infinite}
  .recording .recdot{display:inline-block}
  @keyframes blink{50%{opacity:0}}
  .hint{position:absolute;left:0;right:0;bottom:14px;text-align:center;font-size:12px;
    color:var(--muted);z-index:3;pointer-events:none}
  .bar{display:flex;align-items:center;justify-content:space-between;
    padding:18px 26px calc(20px + env(safe-area-inset-bottom));gap:16px;background:var(--bg)}
  .slot{width:64px;display:flex;justify-content:center}
  .txt{background:none;border:0;color:var(--fg);font-size:15px;padding:10px;cursor:pointer}
  .txt:disabled{color:var(--line)}
  #shutter{width:74px;height:74px;border-radius:50%;border:4px solid var(--fg);background:transparent;
    padding:5px;display:grid;place-items:center;cursor:pointer;touch-action:none;
    -webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
  #shutter>span{width:100%;height:100%;border-radius:50%;background:var(--rec);
    transition:border-radius .15s,transform .15s}
  #shutter:disabled{opacity:.35}
  #shutter.holding>span{border-radius:30%;transform:scale(.7)}
  #result{position:fixed;inset:0;background:var(--bg);z-index:9;display:none;flex-direction:column;
    padding:max(16px,env(safe-area-inset-top)) 16px calc(16px + env(safe-area-inset-bottom))}
  #result.show{display:flex}
  #result video{position:static;flex:1;border-radius:14px;object-fit:contain;background:#000}
  .rbar{display:flex;gap:12px;padding-top:14px}
  .btn{flex:1;text-align:center;text-decoration:none;padding:15px;border-radius:12px;
    font-size:16px;font-weight:600;border:0;cursor:pointer}
  .btn.dl{background:var(--ok);color:#04270f}
  .btn.again{background:var(--line);color:var(--fg)}
  .note{padding-top:10px;font-size:12px;color:var(--muted);text-align:center;line-height:1.6}
  #msg{position:fixed;inset:0;display:none;place-items:center;padding:32px;text-align:center;
    color:var(--muted);font-size:15px;line-height:1.7;z-index:20;white-space:pre-line}
</style>
</head>
<body>
<div id="stage">
  <div class="view" id="view">
    <video id="preview" autoplay muted playsinline></video>
    <div class="track"><i id="bar"></i></div>
    <div class="controls">
      <select id="camSel" aria-label="カメラ"></select>
      <select id="resSel" aria-label="解像度">
        <option value="640x480">480p</option>
        <option value="1280x720">720p</option>
        <option value="1920x1080" selected>1080p</option>
        <option value="3840x2160">4K</option>
      </select>
    </div>
    <div class="actual" id="actual"></div>
    <div class="clock"><span class="recdot"></span><span id="time">0.0 / 15.0s</span></div>
    <div class="hint">ボタンを押している間だけ録画</div>
  </div>
  <div class="bar">
    <div class="slot"></div>
    <button id="shutter" aria-label="押している間だけ録画"><span></span></button>
    <div class="slot"><button id="finish" class="txt" disabled>完了</button></div>
  </div>
</div>

<div id="result">
  <video id="out" controls playsinline></video>
  <div class="rbar">
    <button id="retake" class="btn again">撮り直す</button>
    <button id="save" class="btn dl">保存</button>
  </div>
  <div class="note" id="savehint"></div>
</div>

<div id="msg"></div>

<script>
const MAX_MS = 15000;
const $ = s => document.querySelector(s);
const preview=$('#preview'), shutter=$('#shutter'), finishBtn=$('#finish'),
      bar=$('#bar'), timeEl=$('#time'), view=$('#view'), camSel=$('#camSel'), resSel=$('#resSel'),
      actual=$('#actual'), resultEl=$('#result'), out=$('#out'), saveBtn=$('#save'),
      retake=$('#retake'), saveHint=$('#savehint'), msg=$('#msg');

let stream, recorder, chunks=[], mime='', lastBlob=null;
let accMs=0, holding=false, started=false, holdStart=0, rafMeter=0;
let curDeviceId=null, curRes={w:1920,h:1080};

function fail(t){msg.textContent=t;msg.style.display='grid';}

function pickMime(){
  const c=['video/mp4','video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm'];
  return c.find(m=>window.MediaRecorder&&MediaRecorder.isTypeSupported(m))||'';
}
function makeRecorder(){
  recorder=new MediaRecorder(stream, mime?{mimeType:mime}:undefined);
  recorder.ondataavailable=e=>{ if(e.data&&e.data.size) chunks.push(e.data); };
  recorder.onstop=finalize;
}

/* ===== ストリーム取得・切替 ===== */
async function getStream(){
  const v={ width:{ideal:curRes.w}, height:{ideal:curRes.h} };
  if(curDeviceId) v.deviceId={exact:curDeviceId}; else v.facingMode='environment';
  return navigator.mediaDevices.getUserMedia({ video:v, audio:true });
}

async function applyStream(){
  lockUI(true);
  if(stream) stream.getTracks().forEach(t=>t.stop());   // 端末は同時に1カメラのことが多いので先に停止
  let ns;
  try{ ns=await getStream(); }
  catch(e){ fail('カメラを開始できませんでした（権限・HTTPS・対応解像度を確認）。\n'+e.message); return; }
  stream=ns;
  preview.srcObject=stream;
  const st=stream.getVideoTracks()[0].getSettings();
  curDeviceId=st.deviceId||curDeviceId;                 // 以後は同じカメラを維持
  actual.textContent='実際の解像度: '+(st.width||'?')+'×'+(st.height||'?');
  await refreshCams(curDeviceId);                        // ラベル取得（許可後に名前が入る）
  mime=pickMime();
  makeRecorder();
  lockUI(false);
}

async function refreshCams(selectedId){
  let devs=[]; try{ devs=await navigator.mediaDevices.enumerateDevices(); }catch(_){}
  const cams=devs.filter(d=>d.kind==='videoinput');
  if(!cams.length) return;
  camSel.innerHTML='';
  cams.forEach((d,i)=>{
    const o=document.createElement('option');
    o.value=d.deviceId; o.textContent=d.label||('カメラ '+(i+1));
    camSel.appendChild(o);
  });
  if(selectedId) camSel.value=selectedId;
}

function lockUI(busy){ camSel.disabled=busy; resSel.disabled=busy; shutter.disabled=busy; }

async function init(){
  if(!navigator.mediaDevices?.getUserMedia) return fail('このブラウザはカメラ取得に対応していません。');
  if(!window.MediaRecorder) return fail('このブラウザはMediaRecorderに非対応です。');
  await applyStream();
}

/* ===== 録画（押している間だけ） ===== */
function render(cur){
  bar.style.width=Math.min(cur/MAX_MS*100,100)+'%';
  timeEl.textContent=(Math.min(cur,MAX_MS)/1000).toFixed(1)+' / 15.0s';
}
function meter(){
  if(!holding) return;
  const cur=accMs+(performance.now()-holdStart);
  render(cur);
  if(cur>=MAX_MS){ accMs=MAX_MS; endHold(true); finishRecording(); return; }
  rafMeter=requestAnimationFrame(meter);
}
function startHold(){
  if(!recorder || holding || accMs>=MAX_MS || resultEl.classList.contains('show')) return;
  holding=true;
  shutter.classList.add('holding'); view.classList.add('recording');
  finishBtn.disabled=true;
  if(!started){ recorder.start(); started=true; lockSelectors(); } else { recorder.resume(); }
  holdStart=performance.now();
  rafMeter=requestAnimationFrame(meter);
}
function endHold(reachedMax){
  if(!holding) return;
  holding=false; cancelAnimationFrame(rafMeter);
  accMs += performance.now()-holdStart;
  if(reachedMax) accMs=MAX_MS;
  if(recorder.state==='recording') recorder.pause();
  shutter.classList.remove('holding'); view.classList.remove('recording');
  render(accMs);
  if(accMs<MAX_MS) finishBtn.disabled=false;
}
function finishRecording(){
  finishBtn.disabled=true; shutter.disabled=true;
  if(recorder && recorder.state!=='inactive') recorder.stop();
}
/* 録画開始後はカメラ／解像度の切替を無効化（1本の動画の連続性を保つため） */
function lockSelectors(){ camSel.disabled=true; resSel.disabled=true; }

/* ===== 結果・保存 ===== */
function ext(){ return (lastBlob&&lastBlob.type.includes('mp4'))?'mp4':'webm'; }
function finalize(){
  if(!chunks.length) return;
  const type=chunks[0].type||mime||'video/webm';
  lastBlob=new Blob(chunks,{type});
  out.src=URL.createObjectURL(lastBlob);
  const ok = navigator.canShare && navigator.canShare({files:[new File([lastBlob],'v.'+ext(),{type})]});
  saveHint.textContent = ok
    ? '「保存」→ 共有シートの「ビデオを保存」でカメラロールに入ります。'
    : 'この端末では共有保存が使えないため、保存するとファイルとしてダウンロードされます。';
  resultEl.classList.add('show');
}
async function save(){
  if(!lastBlob) return;
  const file=new File([lastBlob], 'recording-'+Date.now()+'.'+ext(), {type:lastBlob.type});
  if(navigator.canShare && navigator.canShare({files:[file]})){
    try{ await navigator.share({files:[file], title:'録画動画'}); return; }
    catch(e){ if(e.name==='AbortError') return; }
  }
  const a=document.createElement('a');
  a.href=URL.createObjectURL(lastBlob); a.download=file.name;
  document.body.appendChild(a); a.click(); a.remove();
}
function reset(){
  resultEl.classList.remove('show');
  chunks=[]; lastBlob=null; accMs=0; holding=false; started=false;
  shutter.disabled=false; finishBtn.disabled=true;
  camSel.disabled=false; resSel.disabled=false;   // 切替を再び許可
  render(0);
  makeRecorder();
}

/* ===== 入力 ===== */
camSel.addEventListener('change', async()=>{ curDeviceId=camSel.value; await applyStream(); });
resSel.addEventListener('change', async()=>{
  const [w,h]=resSel.value.split('x').map(Number); curRes={w,h}; await applyStream();
});
shutter.addEventListener('pointerdown',e=>{ e.preventDefault(); startHold(); });
window.addEventListener('pointerup',()=>{ if(holding) endHold(false); });
window.addEventListener('pointercancel',()=>{ if(holding) endHold(false); });
shutter.addEventListener('contextmenu',e=>e.preventDefault());
finishBtn.addEventListener('click',finishRecording);
saveBtn.addEventListener('click',save);
retake.addEventListener('click',reset);
init();
</script>
</body>
</html>
